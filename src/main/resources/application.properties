spring.application.name=student-management-backend
server.port=8080

# ===============================
# Database (H2 File Database)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/student_management_system;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# Jackson
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false

# ===============================
# Swagger / OpenAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# JWT
# ===============================
app.jwt.secret=TXlTdXBlclNlY3VyZUp3dFNlY3JldEtleUZvclNNUzEyMzQ1Njc4OTA=
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=604800000

# ===============================
# CORS
# ===============================
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,https://student-management-systm.netlify.app

